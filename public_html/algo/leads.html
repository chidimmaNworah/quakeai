<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algo - Leads Dashboard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          sans-serif;
        background: #0f0f0f;
        color: #fff;
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
      }

      h1 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 2rem;
        background: linear-gradient(90deg, #00d4ff, #7c3aed);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }

      .tab-btn {
        padding: 12px 30px;
        background: #1a1a1a;
        border: 1px solid #333;
        color: #888;
        font-size: 1rem;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.3s ease;
      }

      .tab-btn:hover {
        background: #252525;
        color: #fff;
      }

      .tab-btn.active {
        background: linear-gradient(135deg, #00d4ff, #7c3aed);
        color: #fff;
        border: none;
      }

      .controls {
        display: flex;
        gap: 15px;
        margin-bottom: 20px;
        flex-wrap: wrap;
        align-items: center;
      }

      .date-input {
        padding: 10px 15px;
        background: #1a1a1a;
        border: 1px solid #333;
        color: #fff;
        border-radius: 6px;
        font-size: 0.9rem;
      }

      .date-input:focus {
        outline: none;
        border-color: #00d4ff;
      }

      .refresh-btn {
        padding: 10px 25px;
        background: linear-gradient(135deg, #00d4ff, #7c3aed);
        border: none;
        color: #fff;
        font-size: 1rem;
        cursor: pointer;
        border-radius: 6px;
        transition:
          transform 0.2s ease,
          opacity 0.2s ease;
      }

      .refresh-btn:hover {
        transform: scale(1.02);
        opacity: 0.9;
      }

      .refresh-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .stats {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
      }

      .stat-card {
        background: #1a1a1a;
        border: 1px solid #333;
        padding: 20px 30px;
        border-radius: 10px;
        text-align: center;
      }

      .stat-card .number {
        font-size: 2rem;
        font-weight: bold;
        color: #00d4ff;
      }

      .stat-card .label {
        color: #888;
        font-size: 0.9rem;
        margin-top: 5px;
      }

      .tab-content {
        display: none;
      }

      .tab-content.active {
        display: block;
      }

      .table-container {
        background: #1a1a1a;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid #333;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 15px;
        text-align: left;
        border-bottom: 1px solid #333;
      }

      th {
        background: #252525;
        color: #00d4ff;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 0.5px;
      }

      tr:hover {
        background: #252525;
      }

      td {
        font-size: 0.9rem;
        color: #ccc;
      }

      .status-badge {
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 500;
      }

      .status-new {
        background: rgba(0, 212, 255, 0.2);
        color: #00d4ff;
      }

      .status-ftd {
        background: rgba(34, 197, 94, 0.2);
        color: #22c55e;
      }

      .loading {
        text-align: center;
        padding: 50px;
        color: #888;
      }

      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #333;
        border-top-color: #00d4ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 15px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .error {
        text-align: center;
        padding: 50px;
        color: #ef4444;
      }

      .empty {
        text-align: center;
        padding: 50px;
        color: #888;
      }

      .detail-btn {
        padding: 6px 12px;
        background: #333;
        border: none;
        color: #fff;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.8rem;
        transition: background 0.2s;
      }

      .detail-btn:hover {
        background: #444;
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }

      .modal.active {
        display: flex;
      }

      .modal-content {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 10px;
        padding: 30px;
        max-width: 600px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .modal-header h2 {
        color: #00d4ff;
      }

      .close-btn {
        background: none;
        border: none;
        color: #888;
        font-size: 1.5rem;
        cursor: pointer;
      }

      .close-btn:hover {
        color: #fff;
      }

      .detail-row {
        display: flex;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid #333;
      }

      .detail-row:last-child {
        border-bottom: none;
      }

      .detail-label {
        color: #888;
      }

      .detail-value {
        color: #fff;
        font-weight: 500;
      }
    </style>
    <script src="/navbar.js" defer></script>
  </head>
  <body>
    <div class="container">
      <h1>Leads Dashboard</h1>

      <div class="tabs">
        <button class="tab-btn active" data-tab="leads">Leads</button>
        <button class="tab-btn" data-tab="ftd">FTD</button>
      </div>

      <div class="controls">
        <label style="color: #888">From:</label>
        <input type="datetime-local" class="date-input" id="dateFrom" />
        <label style="color: #888">To:</label>
        <input type="datetime-local" class="date-input" id="dateTo" />
        <button class="refresh-btn" id="refreshBtn">Refresh</button>
      </div>

      <!-- Leads Tab -->
      <div class="tab-content active" id="leads-tab">
        <div class="stats">
          <div class="stat-card">
            <div class="number" id="leadsCount">0</div>
            <div class="label">Total Leads</div>
          </div>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Country</th>
                <th>Created</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="leadsTable">
              <tr>
                <td colspan="8" class="loading">
                  <div class="loading-spinner"></div>
                  Loading leads...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- FTD Tab -->
      <div class="tab-content" id="ftd-tab">
        <div class="stats">
          <div class="stat-card">
            <div class="number" id="ftdCount">0</div>
            <div class="label">Total FTDs</div>
          </div>
          <div class="stat-card">
            <div class="number" id="ftdAmount">$0</div>
            <div class="label">Total Amount</div>
          </div>
        </div>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Amount</th>
                <th>Country</th>
                <th>Deposit Date</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="ftdTable">
              <tr>
                <td colspan="8" class="loading">
                  <div class="loading-spinner"></div>
                  Loading FTDs...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal" id="detailModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Lead Details</h2>
          <button class="close-btn" id="closeModal">&times;</button>
        </div>
        <div id="modalBody"></div>
      </div>
    </div>

    <script>
      // Config
      const API_BASE = "https://quakeai.live/algo";
      const FUNNEL_ID = 600;

      // Set default dates to today
      const now = new Date();
      const today = now.toISOString().slice(0, 10);
      document.getElementById("dateFrom").value = `${today}T00:00`;
      document.getElementById("dateTo").value = now.toISOString().slice(0, 16);

      // Tab switching
      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".tab-btn")
            .forEach((b) => b.classList.remove("active"));
          document
            .querySelectorAll(".tab-content")
            .forEach((c) => c.classList.remove("active"));
          btn.classList.add("active");
          document
            .getElementById(`${btn.dataset.tab}-tab`)
            .classList.add("active");
        });
      });

      // Format date for API
      function formatDateForAPI(dateStr) {
        const date = new Date(dateStr);
        return date.toISOString().replace("T", " ").slice(0, 19);
      }

      // Fetch Leads
      async function fetchLeads() {
        const tbody = document.getElementById("leadsTable");
        tbody.innerHTML =
          '<tr><td colspan="8" class="loading"><div class="loading-spinner"></div>Loading leads...</td></tr>';

        const dateFrom = formatDateForAPI(
          document.getElementById("dateFrom").value,
        );
        const dateTo = formatDateForAPI(
          document.getElementById("dateTo").value,
        );

        try {
          const response = await fetch(`${API_BASE}/leads_proxy.php`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              Service: "AccountsDataBySubCampaign",
              FunnelID: FUNNEL_ID,
              CustomSource: "YourFunnelName",
              CreateTimeFrom: dateFrom,
              CreateTimeTo: dateTo,
            }),
          });

          const data = await response.json();

          if (data.status === "Success" && data.data && data.data.length > 0) {
            document.getElementById("leadsCount").textContent =
              data.data.length;
            tbody.innerHTML = data.data
              .map(
                (lead) => `
            <tr>
              <td>${lead.AccountID || lead.UserID || "-"}</td>
              <td>${lead.FirstName || ""} ${lead.LastName || ""}</td>
              <td>${lead.Email || "-"}</td>
              <td>${lead.Phone || "-"}</td>
              <td>${lead.Country || "-"}</td>
              <td>${lead.CreateTime || lead.CreatedAt || "-"}</td>
              <td><span class="status-badge status-new">New</span></td>
              <td><button class="detail-btn" onclick='showDetails(${JSON.stringify(lead).replace(/'/g, "&#39;")})'>Details</button></td>
            </tr>
          `,
              )
              .join("");
          } else {
            document.getElementById("leadsCount").textContent = "0";
            tbody.innerHTML =
              '<tr><td colspan="8" class="empty">No leads found</td></tr>';
          }
        } catch (error) {
          console.error("Error fetching leads:", error);
          tbody.innerHTML = `<tr><td colspan="8" class="error">Error loading leads: ${error.message}</td></tr>`;
        }
      }

      // Fetch FTDs
      async function fetchFTDs() {
        const tbody = document.getElementById("ftdTable");
        tbody.innerHTML =
          '<tr><td colspan="8" class="loading"><div class="loading-spinner"></div>Loading FTDs...</td></tr>';

        const dateFrom = formatDateForAPI(
          document.getElementById("dateFrom").value,
        );
        const dateTo = formatDateForAPI(
          document.getElementById("dateTo").value,
        );

        try {
          const response = await fetch(`${API_BASE}/ftd_proxy.php`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              Service: "DepositsListBySubCampaign",
              FunnelID: FUNNEL_ID,
              CustomSource: "YourFunnelName",
              CreateTimeFrom: dateFrom,
              CreateTimeTo: dateTo,
            }),
          });

          const data = await response.json();

          if (data.status === "Success" && data.data && data.data.length > 0) {
            document.getElementById("ftdCount").textContent = data.data.length;

            const totalAmount = data.data.reduce(
              (sum, ftd) => sum + (parseFloat(ftd.Amount) || 0),
              0,
            );
            document.getElementById("ftdAmount").textContent =
              `$${totalAmount.toLocaleString()}`;

            tbody.innerHTML = data.data
              .map(
                (ftd) => `
            <tr>
              <td>${ftd.AccountID || ftd.UserID || "-"}</td>
              <td>${ftd.FirstName || ""} ${ftd.LastName || ""}</td>
              <td>${ftd.Email || "-"}</td>
              <td>$${ftd.Amount || "0"}</td>
              <td>${ftd.Country || "-"}</td>
              <td>${ftd.DepositTime || ftd.CreateTime || "-"}</td>
              <td><span class="status-badge status-ftd">FTD</span></td>
              <td><button class="detail-btn" onclick='showDetails(${JSON.stringify(ftd).replace(/'/g, "&#39;")})'>Details</button></td>
            </tr>
          `,
              )
              .join("");
          } else {
            document.getElementById("ftdCount").textContent = "0";
            document.getElementById("ftdAmount").textContent = "$0";
            tbody.innerHTML =
              '<tr><td colspan="8" class="empty">No FTDs found</td></tr>';
          }
        } catch (error) {
          console.error("Error fetching FTDs:", error);
          tbody.innerHTML = `<tr><td colspan="8" class="error">Error loading FTDs: ${error.message}</td></tr>`;
        }
      }

      // Show Details Modal
      function showDetails(data) {
        const modal = document.getElementById("detailModal");
        const modalBody = document.getElementById("modalBody");

        modalBody.innerHTML = Object.entries(data)
          .map(
            ([key, value]) => `
        <div class="detail-row">
          <span class="detail-label">${key}</span>
          <span class="detail-value">${value || "-"}</span>
        </div>
      `,
          )
          .join("");

        modal.classList.add("active");
      }

      // Close Modal
      document.getElementById("closeModal").addEventListener("click", () => {
        document.getElementById("detailModal").classList.remove("active");
      });

      document.getElementById("detailModal").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) {
          e.currentTarget.classList.remove("active");
        }
      });

      // Refresh Button
      document.getElementById("refreshBtn").addEventListener("click", () => {
        const btn = document.getElementById("refreshBtn");
        btn.disabled = true;
        btn.textContent = "Loading...";

        Promise.all([fetchLeads(), fetchFTDs()]).finally(() => {
          btn.disabled = false;
          btn.textContent = "Refresh";
        });
      });

      // Initial load
      fetchLeads();
      fetchFTDs();
    </script>
  </body>
</html>
