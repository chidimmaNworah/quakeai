<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="theme-color" content="#0a0e27" />
    <title>Registration Successful - QuakeAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(
          135deg,
          #0a0e27 0%,
          #1a1040 50%,
          #0d1117 100%
        );
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        text-align: center;
        max-width: 520px;
        padding: 48px 32px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        backdrop-filter: blur(12px);
      }
      .check-circle {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: rgba(34, 197, 94, 0.15);
        border: 2px solid #22c55e;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        animation: scaleIn 0.4s ease-out;
      }
      .check-circle svg {
        width: 40px;
        height: 40px;
        color: #22c55e;
      }
      h1 {
        font-size: 28px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 12px;
      }
      p {
        font-size: 16px;
        line-height: 1.6;
        color: #a0a0b0;
        margin-bottom: 8px;
      }
      .highlight {
        color: #00d4ff;
        font-weight: 600;
      }
      .note {
        margin-top: 24px;
        padding: 16px;
        background: rgba(0, 212, 255, 0.06);
        border: 1px solid rgba(0, 212, 255, 0.15);
        border-radius: 10px;
        font-size: 14px;
        color: #8090a0;
      }
      @keyframes scaleIn {
        from {
          transform: scale(0);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="check-circle">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M5 13l4 4L19 7"
          />
        </svg>
      </div>
      <h1>Registration Successful!</h1>
      <p>
        Your account has been
        <span class="highlight">successfully created</span>.
      </p>
      <p>
        Our team will contact you shortly with your login details and next
        steps.
      </p>
      <div class="note">
        Please check your email inbox (and spam folder) for a confirmation
        message. A representative may also reach out by phone.
      </div>
    </div>
  </body>
</html>
